trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'studenthub'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

  # Service Connections
  acrServiceConnection: 'dr-connection'
  azureSubscription: 'azure subscription 1'

  # Azure Resources
  containerRegistry: 'studentrn.azurecr.io'
  aksResourceGroup: 'rg-student'
  aksCluster: 'aks-pythonstudenthub'

stages:

# ============================
# Build Stage
# ============================

- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: DockerBuild
    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(acrServiceConnection)
        tags: |
          $(tag)
          latest

# ============================
# Deploy Stage
# ============================

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - job: AKSDeploy
    steps:

    - checkout: self

    - task: KubernetesManifest@1
      displayName: Deploy Application
      inputs:
        action: deploy
        connectionType: 'azureResourceManager'
        azureSubscriptionConnection: $(azureSubscription)
        azureResourceGroup: $(aksResourceGroup)
        kubernetesCluster: $(aksCluster)
        namespace: default

        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml

        containers: |
          $(containerRegistry)/$(imageRepository):$(tag)
