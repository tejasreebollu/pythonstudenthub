trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'studenthub'
  containerRegistry: 'pythonlask.azurecr.io'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

  # Service Connections
  dockerRegistryServiceConnection: 'dr-connection'
  azureSubscription: 'rm-connection'

  # AKS
  aksResourceGroup: 'pythonflask-rg'
  aksClusterName: 'aks-pythonflask'

stages:

# ============================
# Build & Push Docker Image
# ============================
- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildPush
    displayName: Build Docker Image

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# ============================
# Deploy to AKS
# ============================
- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build

  jobs:
  - job: DeployAKS
    displayName: Deploy Application

    steps:

    - task: AzureCLI@2
      displayName: Get AKS Credentials
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group $(aksResourceGroup) \
            --name $(aksClusterName) \
            --overwrite-existing

    - task: Kubernetes@1
      displayName: Deploy to AKS
      inputs:
        connectionType: 'None'
        command: apply
        useConfigurationFile: true
        configuration: |
          k8s/deployment.yaml
          k8s/service.yaml
